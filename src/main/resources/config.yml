      type: ""
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # ПАУТИНА
  # Ломает жилу одинаковых блоков.
  # ----------------------------------------------------------------------------
  web:
    general:
      enabled: true
      name: "Паутина"
      max-level: 1      # Только 1 уровень
      allowed-items:
        - NETHERITE_PICKAXE
        - DIAMOND_PICKAXE
        - IRON_PICKAXE
        - GOLDEN_PICKAXE
        - STONE_PICKAXE
        - WOODEN_PICKAXE
        - NETHERITE_AXE
        - DIAMOND_AXE
        - IRON_AXE
        - GOLDEN_AXE
        - STONE_AXE
        - WOODEN_AXE
    anvil:
      cost-per-level: 8
    table:
      enabled: true
      base-chance: 0.02
      chance-per-exp: 0.001
      levels:
        1:
          threshold: 30
          chance: 0.05
    vein-mine:
      limit: 64 # Максимум блоков за раз
      # Список блоков, на которые срабатывает способность.
      # Можно писать полные названия: COAL_ORE
      # Или использовать звездочку в начале для окончания: *_ORE (все руды)
      # *_LOG (все бревна)
      whitelist:
        - "*_ORE"
        - "*_LOG"
        - "*_STEM"
        - "ANCIENT_DEBRIS"
        - "GLOWSTONE"
        - "AMETHYST_CLUSTER"
        - "AMETHYST_BLOCK"
        - "NETHER_QUARTZ_ORE"
        - "NETHER_GOLD_ORE"
        - "CLAY"
        - "GRAVEL"
    sound:
      type: ""
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # СТУПОР
  # При попадании брошенным трезубцем накладывает Слабость и Замедление.
  # ----------------------------------------------------------------------------
  stupor:
    general:
      enabled: true
      name: "Ступор"
      max-level: 3
      allowed-items:
        - TRIDENT
    anvil:
      cost-per-level: 2
    table:
      enabled: true
      base-chance: 0.10
      chance-per-exp: 0.003
      levels:
        1:
          threshold: 10
          chance: 0.25
        2:
          threshold: 20
          chance: 0.15
        3:
          threshold: 30
          chance: 0.05
    combat:
      chance-base: 0.40
      chance-per-level: 0.20
      effect:
        duration-base: 60
        duration-per-level: 20
        amplifier-divisor: 1
    sound:
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # БУЛЬДОЗЕР
  # Вскапывает область (3x3, 5x5 и т.д.)
  # ----------------------------------------------------------------------------
  bulldozer:
    general:
      enabled: true
      name: "Бульдозер"
      max-level: 2
      allowed-items:
        - NETHERITE_PICKAXE
        - DIAMOND_PICKAXE
        - IRON_PICKAXE
        - GOLDEN_PICKAXE
        - WOODEN_PICKAXE
        - STONE_PICKAXE
        - NETHERITE_SHOVEL
        - DIAMOND_SHOVEL
        - IRON_SHOVEL
    anvil:
      cost-per-level: 4
    table:
      enabled: true
      base-chance: 0.05
      chance-per-exp: 0.001
      levels:
        1:
          threshold: 30
          chance: 0.10
        2:
          threshold: 30
          chance: 0.02
    mining:
      # Радиус (Radius):
      # 0 = 1x1 (обычное копание, бесполезно)
      # 1 = 3x3 (1 блок влево, 1 вправо от центра)
      # 2 = 5x5
      # Формула: radius-base + (radius-per-level * уровень)
      radius-base: 1   # На 1 уровне уже копает 3x3
      radius-per-level: 0 # На 2 уровне останется 3x3 (можно поставить 1, тогда будет 5x5)
      # Глубина (Depth):
      # Сколько слоев вглубь.
      # 1 = 1 слой (стандарт)
      # Формула: depth-base + (depth-per-level * уровень)
      depth-base: 1
      depth-per-level: 1 # На 2 уровне будет копать 2 блока в глубину (3x3x2)
    sound:
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # ПРИТЯЖЕНИЕ
  # Притягивает противника к игроку при попадании трезубца.
  # ----------------------------------------------------------------------------
  attraction:
    general:
      enabled: true
      name: "Притяжение"
      max-level: 3
      allowed-items:
        - TRIDENT
    anvil:
      cost-per-level: 2
    table:
      enabled: true
      base-chance: 0.1
      chance-per-exp: 0.003
      levels:
        1:
          threshold: 25
          chance: 0.25
        2:
          threshold: 30
          chance: 0.15
    pull:
      # Базовая сила притягивания.
      # Формула: strength-base + (strength-per-level * Уровень_Чар)
      strength-base: 1.10
      strength-per-level: 0.8
      # Добавочная сила вверх
      # Рекомендуемое значение: 0.3 - 0.8.
      vertical-bonus: 0.5
    sound:
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # ОПЫТНЫЙ
  # Увеличивает количество опыта, выпадающего из блоков (руды) и мобов.
  # ----------------------------------------------------------------------------
  experience:
    general:
      enabled: true
      name: "Опытный"
      max-level: 3
      allowed-items:
        - NETHERITE_PICKAXE
        - DIAMOND_PICKAXE
        - IRON_PICKAXE
        - GOLDEN_PICKAXE
        - WOODEN_PICKAXE
        - STONE_PICKAXE
        - NETHERITE_SWORD
        - DIAMOND_SWORD
        - IRON_SWORD
        - GOLDEN_SWORD
        - WOODEN_SWORD
        - STONE_SWORD
        - TRIDENT
    anvil:
      cost-per-level: 2
    table:
      enabled: true
      base-chance: 0.1
      chance-per-exp: 0.003
      levels:
        1:
          threshold: 5
          chance: 0.25
        2:
          threshold: 25
          chance: 0.15
        3:
          threshold: 30
          chance: 0.10
    bonus:
      # Множитель добавочного опыта.
      # Формула: multiplier-base + (multiplier-per-level * Уровень_Чар)
      # Пример (3 уровень): 0.2 + (0.2 * 3) = 0.8.
      # Это значит +80% к стандартному опыту. Если моб давал 10 XP, даст 18 XP.
      multiplier-base: 0.2
      multiplier-per-level: 0.2
    sound:
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0
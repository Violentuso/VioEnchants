    anvil:
      cost-per-level: 3
    table:
      enabled: true
      base-chance: 0.1
      chance-per-exp: 0.003
      levels:
        1:
          threshold: 15
          chance: 0.20
    effects:
      amplifier: 1 # Уровень эффекта (0 = Прыгучесть I, 1 = Прыгучесть II)
    sound:

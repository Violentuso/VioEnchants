        - DIAMOND_PICKAXE
        - NETHERITE_SWORD
        - DIAMOND_SWORD
        - NETHERITE_AXE
        - DIAMOND_AXE
    anvil:
      cost-per-level: 1
    table:
      enabled: true
      base-chance: 0.1
      chance-per-exp: 0.005
      levels:
        1: { threshold: 5, chance: 0.3 }
        2: { threshold: 15, chance: 0.2 }
        3: { threshold: 30, chance: 0.1 }
    effects:
      duration-base: 60
      duration-per-level: 40
      amplifier: 1
    sound:
      type: ""
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # МЕГА-БУЛЬДОЗЕР
  # Копает 9x9x9.
  # ----------------------------------------------------------------------------
  mega_bulldozer:
    general:
      enabled: true
      name: "Мега-Бульдозер"
      max-level: 1
      allowed-items:
        - NETHERITE_PICKAXE
        - DIAMOND_PICKAXE
        - GOLDEN_PICKAXE
        - WOODEN_PICKAXE

    anvil:
      cost-per-level: 10
    table:
      enabled: false
      base-chance: 0.0
      chance-per-exp: 0.0
    restrictions:
      # Список регионов, где этот чар НЕ БУДЕТ работать.
      blocked-regions:
        - "spawn"
        - "pvp_arena"
    sound:
      type: "ENTITY_PLAYER_LEVELUP"
      volume: 1.0
      pitch: 1.0

  # ----------------------------------------------------------------------------
  # ПОПРЫГУН
  # Дает постоянный эффект прыгучести при ношении ботинок.
  # ----------------------------------------------------------------------------
  jumper:
    general:
      enabled: true
      name: "Попрыгун"
      max-level: 1
      allowed-items:

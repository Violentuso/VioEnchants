        - DIAMOND_SHOVEL
        - IRON_SHOVEL
        - GOLDEN_SHOVEL
        - STONE_SHOVEL
        - WOODEN_SHOVEL
        - NETHERITE_AXE
        - DIAMOND_AXE
        - IRON_AXE
        - GOLDEN_AXE
        - STONE_AXE
        - WOODEN_AXE
        - NETHERITE_HOE
        - DIAMOND_HOE
        - NETHERITE_SWORD
        - DIAMOND_SWORD
        - IRON_SWORD
        - GOLDEN_SWORD
        - WOODEN_SWORD
        - STONE_SWORD
        - TRIDENT
        - NETHERITE_AXE
        - DIAMOND_AXE
        - BOW
        - CROSSBOW
        - DIAMOND_HELMET
        - DIAMOND_CHESTPLATE
        - DIAMOND_LEGGINGS
        - DIAMOND_BOOTS
        - GOLDEN_HELMET
        - GOLDEN_CHESTPLATE
        - GOLDEN_LEGGINGS
        - GOLDEN_BOOTS
        - LEATHER_HELMET
        - LEATHER_CHESTPLATE
        - LEATHER_LEGGINGS
        - LEATHER_BOOTS
        - IRON_HELMET
        - IRON_CHESTPLATE
        - IRON_LEGGINGS
        - IRON_BOOTS
    anvil:
      cost-per-level: 1
    table:
      enabled: true
      base-chance: 0.1
      chance-per-exp: 0.005
      levels:
        1:
          threshold: 5
          chance: 0.30
        2:
          threshold: 15
          chance: 0.20
        3:
          threshold: 30
          chance: 0.10
    durability:
